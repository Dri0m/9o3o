<div class="content">
	<form class="search" action="/browse" method="get">
		<input class="textbox" type="text" name="query" value="{Query}" placeholder="Search 9o3o...">
		<button class="submit" type="submit">Search</button>
		<div class="nsfw">
			<input class="checkbox" type="checkbox" name="nsfw" value="true" id="nsfw"{NSFW_Checked}>
			<label class="label" for="nsfw">Include NSFW</label>
		</div>
		<input type="checkbox" name="everything" value="true"{Everything_Checked} hidden>
	</form>
	<div class="navigation">
		<div class="tag-header">
			<b>Tags on this page:</b>
		</div>
		<div class="total">
			<b>{Total_Results}</b> results
		</div>
		<div class="pages">
			{Prev_Page}
			{Next_Page}
		</div>
	</div>
	<div class="browser">
		<div class="sidebar">
			{Tags}
		</div>
		<div class="results">
			{Results}
		</div>
	</div>
</div>
